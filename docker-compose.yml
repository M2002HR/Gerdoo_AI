services:
  mysql:
    image: mysql:8.0
    container_name: gerdoo-mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT_HOST:-13306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: gerdoo-phpmyadmin
    restart: unless-stopped
    command:
      - /bin/sh
      - -lc
      - |
        printf '%s\n' 'ServerName localhost' > /etc/apache2/conf-available/zz-servername.conf
        a2enconf zz-servername >/dev/null
        exec apache2-foreground
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      UPLOAD_LIMIT: 64M
    ports:
      - "${PHPMYADMIN_PORT_HOST:-18082}:80"

  uag-redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  host-proxy-bridge:
    image: alpine/socat
    command:
      - "TCP-LISTEN:32080,fork,reuseaddr,bind=0.0.0.0"
      - "TCP:127.0.0.1:2080"
    network_mode: host
    restart: unless-stopped

  uag-gateway:
    build:
      context: ./uag_server
      network: ${UAG_DOCKER_BUILD_NETWORK:-default}
      args:
        HTTP_PROXY: ${UAG_BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${UAG_BUILD_HTTPS_PROXY:-}
        ALL_PROXY: ${UAG_BUILD_ALL_PROXY:-}
        NO_PROXY: ${UAG_BUILD_NO_PROXY:-}
        PIP_INDEX_URL: ${UAG_PIP_INDEX_URL:-}
        PIP_EXTRA_INDEX_URL: ${UAG_PIP_EXTRA_INDEX_URL:-}
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      UAG_REDIS_URL: redis://uag-redis:6379/0
      UAG_PROXY_URL: ${UAG_PROXY_URL_DOCKER:-}
      UAG_PROXY_ENABLED: ${UAG_PROXY_ENABLED:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      uag-redis:
        condition: service_healthy
      host-proxy-bridge:
        condition: service_started
    ports:
      - "${UAG_PORT_HOST:-18080}:8080"

  bale-ai-bot:
    build:
      context: .
      network: ${UAG_DOCKER_BUILD_NETWORK:-default}
      args:
        HTTP_PROXY: ${UAG_BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${UAG_BUILD_HTTPS_PROXY:-}
        ALL_PROXY: ${UAG_BUILD_ALL_PROXY:-}
        NO_PROXY: ${UAG_BUILD_NO_PROXY:-}
        PIP_INDEX_URL: ${UAG_PIP_INDEX_URL:-}
        PIP_EXTRA_INDEX_URL: ${UAG_PIP_EXTRA_INDEX_URL:-}
    container_name: bale-ai-bot
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      UAG_BASE_URL: http://uag-gateway:8080
      UAG_CHAT_ENDPOINT: /v1/chat/completions
      HTTP_PROXY: ${BALE_HTTP_PROXY:-}
      HTTPS_PROXY: ${BALE_HTTPS_PROXY:-}
      ALL_PROXY: ${BALE_ALL_PROXY:-}
      NO_PROXY: ${BALE_NO_PROXY:-localhost,127.0.0.1,uag-gateway,mysql,uag-redis}
      http_proxy: ${BALE_HTTP_PROXY:-}
      https_proxy: ${BALE_HTTPS_PROXY:-}
      all_proxy: ${BALE_ALL_PROXY:-}
      no_proxy: ${BALE_NO_PROXY:-localhost,127.0.0.1,uag-gateway,mysql,uag-redis}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      uag-gateway:
        condition: service_started
      mysql:
        condition: service_healthy
      host-proxy-bridge:
        condition: service_started

  bale-admin-panel:
    build:
      context: .
      network: ${UAG_DOCKER_BUILD_NETWORK:-default}
      args:
        HTTP_PROXY: ${UAG_BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${UAG_BUILD_HTTPS_PROXY:-}
        ALL_PROXY: ${UAG_BUILD_ALL_PROXY:-}
        NO_PROXY: ${UAG_BUILD_NO_PROXY:-}
        PIP_INDEX_URL: ${UAG_PIP_INDEX_URL:-}
        PIP_EXTRA_INDEX_URL: ${UAG_PIP_EXTRA_INDEX_URL:-}
    container_name: bale-admin-panel
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DB_URL: ${DB_URL}
      UAG_BASE_URL: http://uag-gateway:8080
      BOT_ADMIN_PANEL_ENABLED: ${BOT_ADMIN_PANEL_ENABLED:-true}
      BOT_ADMIN_PANEL_HEADER_NAME: ${BOT_ADMIN_PANEL_HEADER_NAME:-x-admin-token}
      BOT_ADMIN_PANEL_TOKEN: ${BOT_ADMIN_PANEL_TOKEN:-}
      BOT_ADMIN_PANEL_UAG_ENABLED: ${BOT_ADMIN_PANEL_UAG_ENABLED:-true}
      BOT_ADMIN_PANEL_UAG_TIMEOUT_SEC: ${BOT_ADMIN_PANEL_UAG_TIMEOUT_SEC:-8}
    depends_on:
      mysql:
        condition: service_healthy
      uag-gateway:
        condition: service_started
    command:
      - uvicorn
      - gerdoo_ai_bot.admin_panel:app
      - --host
      - 0.0.0.0
      - --port
      - "8090"
    ports:
      - "${BOT_ADMIN_PANEL_PORT_HOST:-18083}:8090"

volumes:
  mysql_data:
